<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Insta Control | Remote</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            padding: 20px;
        }

        .box {
            background: rgba(21, 21, 21, 0.9);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            width: 340px; 
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
        }

        .img-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .img-container, .img-container-new {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .img-container {
            padding: 2px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: rgb-glow 5s linear infinite;
        }

        @keyframes rgb-glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        h2 { font-size: 18px; margin-bottom: 5px; color: #fff; text-transform: uppercase; }
        #status-text { font-size: 13px; color: #2ecc71; margin-bottom: 15px; font-weight: bold; }

        .btn {
            display: block;
            width: 100%;
            height: 45px;
            line-height: 45px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-clear { background: #ffffff; color: #000; }
        .btn-dollar { background: #f3ba2f; color: #000; }

        #updateMsgBox {
            display: none;
            background: rgba(255, 71, 87, 0.1);
            border: 1px dashed #ff4757;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            color: #ff9f9f;
            font-size: 14px;
            line-height: 1.5;
        }
        
        /* Modal remains hidden as trigger is removed */
        #dollarModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="box">
    <div class="img-row">
        <div class="img-container"><img src="arafat/1772975003436.png" alt="1" class="top-img"></div>
        <div class="img-container-new"><img src="arafat/2728aj.jpg" alt="2" class="top-img"></div>
    </div>
    
    <h2 id="title">Insta Control</h2>
    <div id="status-text">System Active</div>
    
    <div id="actionButtons">
        <button class="btn btn-clear">Clear Data</button>
        <button class="btn btn-dollar">Dollr Sell</button>
    </div>

    <div id="updateMsgBox">
        ⚠️ <b>অ্যাপ আপডেট করা হয়েছে।</b><br>
        এডমিন পুনরায় সার্ভিস চালু করলে আপনি আবার ব্যবহার করতে পারবেন। অনুগ্রহ করে অপেক্ষা করুন।
    </div>
</div>

<script>
    // সার্ভার চেক ফাংশনটি রাখা হয়েছে যাতে ইন্টারফেস আপডেট হতে পারে, কিন্তু বাটন কাজ করবে না
    const REMOTE_URL = "https://raw.githubusercontent.com/ferojmajumder100-lang/INSTAGRAM-control/main/status.txt";

    function checkRemoteUpdate() {
        fetch(REMOTE_URL + "?t=" + new Date().getTime())
            .then(response => response.text())
            .then(status => {
                if (status.trim() === "UPDATE") {
                    showUpdateScreen();
                } else {
                    document.getElementById('status-text').innerText = "System Active";
                    document.getElementById('status-text').style.color = "#2ecc71";
                }
            })
            .catch(() => {
                document.getElementById('status-text').innerText = "System Active";
            });
    }

    function showUpdateScreen() {
        document.getElementById('status-text').innerText = "Status: Maintenance";
        document.getElementById('status-text').style.color = "#ff4757";
        document.getElementById('title').innerText = "Service Closed";
        document.getElementById('actionButtons').classList.add('hidden');
        document.getElementById('updateMsgBox').style.display = 'block';
    }

    // আগের ফাংশনগুলো অকার্যকর (Empty) করে দেওয়া হয়েছে
    function forceClear() {
        // Nothing happens
    }

    function showDollarMenu() {
        // Nothing happens
    }

    window.onload = checkRemoteUpdate;
</script>

</body>
</html>
