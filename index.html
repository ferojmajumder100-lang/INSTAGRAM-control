<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Status - Colorful</title>
    <style>
        /* ব্যাকগ্রাউন্ড অ্যানিমেশন */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9); /* হালকা স্বচ্ছ সাদা */
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 450px;
            backdrop-filter: blur(5px); /* গ্লাস ইফেক্ট */
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #d63031;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p.status {
            color: #2d3436;
            font-size: 20px;
            font-weight: bold;
        }

        .dua-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .arabic {
            font-size: 24px;
            color: #1b1464;
            margin-bottom: 10px;
            direction: rtl;
            font-weight: bold;
        }

        .translation {
            color: #636e72;
            font-size: 16px;
            line-height: 1.5;
        }

        /* লেখার ওপর হালকা পালস ইফেক্ট */
        .status-msg {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-msg">
            <h1>দুঃখিত!</h1>
            <p class="status">App টা এখন বন্ধ আছে,<br>সকালে চালু হবে।</p>
        </div>

        <div class="dua-section">
            <p style="color: #009432; font-weight: bold; margin-bottom: 15px;">একটি বিশেষ দোয়া:</p>
            <div class="arabic">حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ</div>
            <div class="translation">"আমাদের জন্য আল্লাহই যথেষ্ট এবং তিনি কতই না চমৎকার কর্মবিধায়ক।"</div>
        </div>
    </div>

</body>
</html>
